[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
asyncio_mode = auto
markers =
    asyncio: mark test as async
    slow: mark test as slow running
    nanobot: legacy nanobot tests (may require additional setup)
addopts = -v --tb=short
# By default, ignore legacy nanobot test subdirectories that require full nanobot setup.
# Run new godot-agent tests with: pytest tests/test_*.py
# Run all tests with: pytest tests/ --ignore=tests/agent --ignore=tests/channels ...