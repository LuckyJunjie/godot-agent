[project]
name = "godot-agent"
version = "0.1.0"
description = "AI-powered agent for Godot 4.x game development, extending nanobot"
readme = "README.md"
requires-python = ">=3.11"
license = {text = "MIT"}
authors = [
    {name = "Newton Team"},
]
keywords = ["ai", "agent", "godot", "gamedev", "gdscript"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
]

dependencies = [
    "nanobot-ai>=0.1.5",
    "typer>=0.20.0,<1.0.0",
    "pydantic>=2.12.0,<3.0.0",
    "httpx>=0.28.0,<1.0.0",
    "pyyaml>=6.0,<7.0.0",
    "jinja2>=3.1.0,<4.0.0",
    "rich>=14.0.0,<15.0.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=9.0.0,<10.0.0",
    "pytest-asyncio>=1.3.0,<2.0.0",
    "pytest-cov>=6.0.0,<7.0.0",
    "ruff>=0.1.0",
]

[project.scripts]
godot-agent = "godot_agent.cli:app"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["godot_agent"]

[tool.hatch.build]
include = [
    "godot_agent/**/*.py",
    "godot_agent/**/*.yaml",
    "godot_agent/**/*.gd",
    "godot_agent/**/*.tscn",
    "godot_agent/**/*.md",
    "skills/**/*.yaml",
    "skills/**/*.md",
]

[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "I", "N", "W"]
ignore = ["E501"]

[tool.pytest.ini_options]
asyncio_mode = "auto"

[tool.coverage.run]
source = ["godot_agent"]
omit = ["tests/*", "**/tests/*"]
